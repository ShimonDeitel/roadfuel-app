name: RoadsideFuel
options:
  bundleIdPrefix: com.shimondeitel.fuellog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RoadsideFuel:
    type: application
    platform: iOS
    sources:
      - path: RoadsideFuel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RoadsideFuel/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoadsideFuelTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoadsideFuelTests
      - path: RoadsideFuel.storekit
    dependencies:
      - target: RoadsideFuel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoadsideFuelUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoadsideFuelUITests
    dependencies:
      - target: RoadsideFuel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuellog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RoadsideFuel:
    build:
      targets:
        RoadsideFuel: all
        RoadsideFuelTests: [test]
        RoadsideFuelUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RoadsideFuel.storekit
    test:
      config: Debug
      storeKitConfiguration: RoadsideFuel.storekit
      targets:
        - RoadsideFuelTests
        - RoadsideFuelUITests
    archive:
      config: Release
